<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparativo</title>
    <style>
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe3ec;
      --primary: #0ea5e9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #e0f2fe 0%, var(--bg) 260px);
      color: var(--text);
      padding: 0 1rem 2rem;
    }

    header {
      text-align: center;
      padding: 20px 0 10px;
    }

    #comparador { max-width: 900px; margin: 1rem auto 0; }
    .cmp-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      display: inline-block;
    }
    .slots-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; align-items: start; }

    .slot-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      position: relative;
      animation: fadeIn .18s ease;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
    }
    .slot-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .slot-remove { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 16px; line-height: 1; padding: 0 4px; border-radius: 4px; }
    .slot-remove:hover { color: #334155; background: #f1f5f9; }

    .input-wrap { position: relative; }
    .slot-input { width: 100%; font-size: 13px; padding: 8px 28px 8px 10px; border: 1px solid #cbd5e1; border-radius: 8px; background: #f8fafc; color: var(--text); outline: none; transition: border-color .2s; }
    .slot-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(14, 165, 233, .2); }
    .slot-input::placeholder { color: #94a3b8; }
    .input-clear { position: absolute; right: 7px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 14px; line-height: 1; padding: 2px 4px; display: none; }
    .input-clear:hover { color: #334155; }

    .dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid #cbd5e1; border-radius: 10px; z-index: 100; max-height: 220px; overflow-y: auto; box-shadow: 0 8px 20px rgba(0,0,0,.09); display: none; }
    .dd-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover { background: #f8fafc; }
    .dd-thumb { width: 32px; height: 32px; object-fit: contain; border-radius: 4px; background: #f1f5f9; flex-shrink: 0; }
    .dd-thumb-placeholder { width: 32px; height: 32px; border-radius: 4px; background: #f1f5f9; flex-shrink: 0; }
    .dd-name { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dd-brand { font-size: 11px; color: var(--muted); }
    .dd-msg { padding: 10px; font-size: 13px; color: var(--muted); text-align: center; }

    .selected-chip { display: flex; align-items: center; gap: 8px; background: #f8fafc; border-radius: 8px; padding: 6px 8px; margin-top: 8px; border: 1px solid var(--border); }
    .chip-img { width: 24px; height: 24px; object-fit: contain; border-radius: 3px; }
    .chip-name { flex: 1; font-size: 12px; font-weight: 600; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chip-clear { background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 14px; padding: 0 2px; line-height: 1; }
    .chip-clear:hover { color: #334155; }

    .nutri-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 8px; }
    .nutri-cell { background: #f8fafc; border-radius: 8px; padding: 5px 8px; border: 1px solid var(--border); }
    .nutri-val { font-size: 13px; font-weight: 700; color: #1e293b; }
    .nutri-lbl { font-size: 10px; color: var(--muted); }

    .add-btn { display: flex; align-items: center; justify-content: center; gap: 6px; background: none; border: 1px dashed #cbd5e1; border-radius: 12px; padding: 14px; cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 600; min-height: 80px; width: 100%; transition: background .15s, border-color .15s, color .15s; }
    .add-btn:hover { background: #f8fafc; border-color: var(--primary); color: #0f172a; }

    .cmp-footer { margin-top: 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .counter { font-size: 12px; color: var(--muted); }
    .compare-btn { font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 8px; border: 1px solid #cbd5e1; background: var(--surface); color: #1e293b; cursor: pointer; transition: background .15s; }
    .compare-btn:hover { background: #f8fafc; }
    .compare-btn:disabled { opacity: .4; cursor: not-allowed; }

    @keyframes fadeIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>
    <header>
        <h1>NutriPro</h1>
        
    </header>

    <main class="comparador-container">
        <div id="comparador">
    <p class="cmp-header">Comparar produtos</p>
    <div class="slots-grid" id="slots-grid"></div>
    <div class="cmp-footer">
      <span class="counter" id="counter"></span>
      <button class="compare-btn" id="compare-btn" disabled>Comparar nutrição →</button>
    </div>
  </div>



        <datalist id="lista-alimentos"></datalist>
    </main>

    <script>
  (function () {
    const MAX = 4;
    const OFF_URL = "https://pt.openfoodfacts.org/cgi/search.pl";
    let slots = [{ id: 1, value: "", product: null, primary: true }];
    let timers = {};

    // ── API ────────────────────────────────────────────────
    async function searchOFF(query) {
      
    const params = new URLSearchParams({
    search_terms: query,
    search_simple: '1',
    action: 'process',
    json: '1',
    page_size: '6',
    lc: 'pt',
    fields: 'id,product_name,brands,image_small_url,nutriments',
  });

  const res = await fetch(`${OFF_URL}?${params}`, {
    headers: {
      'User-Agent': 'NutriPro/1.0 (guilahenrique2004@gmail.com)',
    },
  });

  const data = await res.json();
  return data.products ?? [];
}
      

    function getNutri(p) {
  const n = p.nutriments ?? {};
  const fmt = (v, u = "g") => v != null ? `${Math.round(v)}${u}` : "—";
  return {
    kcal:    fmt(n["energy-kcal_100g"] ?? n["energy-kcal"] ?? n["energy_100g"] != null ? Math.round((n["energy_100g"] ?? 0) / 4.184) : null, "kcal"),
    sugar:   fmt(n["sugars_100g"] ?? n["sugars"]),
    fat:     fmt(n["fat_100g"] ?? n["fat"]),
    protein: fmt(n["proteins_100g"] ?? n["proteins"]),
  };
}

    // ── Render helpers ─────────────────────────────────────
    function renderChip(slot) {
      const p = slot.product;
      const img = p.image_small_url
        ? `<img class="chip-img" src="${p.image_small_url}" alt="" />`
        : "";
      return `<div class="selected-chip">
        ${img}
        <span class="chip-name">${escHtml(p.product_name.substring(0, 32))}</span>
        <button class="chip-clear" data-clear="${slot.id}" aria-label="Limpar">×</button>
      </div>`;
    }

    function renderNutri(p) {
      const n = getNutri(p);
      return `<div class="nutri-mini">
        <div class="nutri-cell"><div class="nutri-val">${n.kcal}</div><div class="nutri-lbl">Energia /100g</div></div>
        <div class="nutri-cell"><div class="nutri-val">${n.sugar}</div><div class="nutri-lbl">Açúcares</div></div>
        <div class="nutri-cell"><div class="nutri-val">${n.fat}</div><div class="nutri-lbl">Gorduras</div></div>
        <div class="nutri-cell"><div class="nutri-val">${n.protein}</div><div class="nutri-lbl">Proteínas</div></div>
      </div>`;
    }

    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── Main render ────────────────────────────────────────
    function render() {
      const grid = document.getElementById("slots-grid");
      grid.innerHTML = "";

      slots.forEach((slot, idx) => {
        const labelText = slot.primary ? "★ Produto principal" : `Produto ${idx + 1}`;
        const card = document.createElement("div");
        card.className = "slot-card";
        card.dataset.slotId = slot.id;
        card.innerHTML = `
          <p class="slot-label">${labelText}</p>
          ${!slot.primary ? `<button class="slot-remove" data-remove="${slot.id}" aria-label="Remover slot">×</button>` : ""}
          <div class="input-wrap">
            <input class="slot-input" type="text" placeholder="Digite para buscar..." autocomplete="off"
              value="${escHtml(slot.value)}" data-slot="${slot.id}" aria-label="Buscar ${labelText}" />
            <button class="input-clear" data-input-clear="${slot.id}" aria-label="Limpar campo"
              style="display:${slot.value ? "block" : "none"}">×</button>
            <div class="dropdown" id="dd-${slot.id}"></div>
          </div>
          <div id="product-info-${slot.id}">
            ${slot.product ? renderChip(slot) + renderNutri(slot.product) : ""}
          </div>`;
        grid.appendChild(card);

        // Input events
        const input = card.querySelector(".slot-input");
        const clearBtn = card.querySelector(".input-clear");
        const dd = card.querySelector(".dropdown");

        input.addEventListener("input", (e) => {
          const val = e.target.value;
          slot.value = val;
          clearBtn.style.display = val ? "block" : "none";
          if (val.length < 2) { dd.style.display = "none"; return; }
          dd.style.display = "block";
          dd.innerHTML = `<div class="dd-msg">Buscando...</div>`;
          clearTimeout(timers[slot.id]);
          timers[slot.id] = setTimeout(async () => {
            if (!slot.value || slot.value.length < 2) { dd.style.display = "none"; return; }
            try {
              const results = await searchOFF(slot.value);
              if (!results.length) { dd.innerHTML = `<div class="dd-msg">Nenhum resultado</div>`; return; }
              dd.innerHTML = "";
              results.forEach(p => {
                const item = document.createElement("div");
                item.className = "dd-item";
                item.innerHTML = `
                  ${p.image_small_url
                    ? `<img class="dd-thumb" src="${p.image_small_url}" alt="" />`
                    : `<div class="dd-thumb-placeholder"></div>`}
                  <div style="min-width:0">
                    <div class="dd-name">${escHtml((p.product_name || "Sem nome").substring(0, 40))}</div>
                    ${p.brands ? `<div class="dd-brand">${escHtml(p.brands.substring(0, 28))}</div>` : ""}
                  </div>`;
                item.addEventListener("mousedown", (e) => {
                  e.preventDefault();
                  slot.value = p.product_name;
                  slot.product = p;
                  input.value = p.product_name;
                  clearBtn.style.display = "block";
                  dd.style.display = "none";
                  document.getElementById(`product-info-${slot.id}`).innerHTML =
                    renderChip(slot) + renderNutri(p);
                  updateFooter();
                });
                dd.appendChild(item);
              });
            } catch {
              dd.innerHTML = `<div class="dd-msg">Erro na busca</div>`;
            }
          }, 420);
          updateFooter();
        });

        input.addEventListener("blur", () => setTimeout(() => dd.style.display = "none", 150));
        input.addEventListener("focus", () => {
          if (slot.value.length >= 2 && !slot.product) dd.style.display = "block";
        });
      });

      // Add slot button
      if (slots.length < MAX) {
        const btn = document.createElement("button");
        btn.className = "add-btn";
        btn.innerHTML = `<span style="font-size:18px;line-height:1">+</span> Adicionar produto`;
        btn.addEventListener("click", () => {
          slots.push({ id: Date.now(), value: "", product: null, primary: false });
          render();
          setTimeout(() => {
            const inputs = document.querySelectorAll(".slot-input");
            inputs[inputs.length - 1].focus();
          }, 50);
        });
        grid.appendChild(btn);
      }

      // Delegated events for remove / clear buttons
      grid.addEventListener("click", (e) => {
        const removeId = e.target.dataset.remove;
        const clearId  = e.target.dataset.inputClear ?? e.target.dataset.clear;
        if (removeId) {
          slots = slots.filter(s => s.id != removeId);
          render();
        }
        if (clearId) {
          const slot = slots.find(s => s.id == clearId);
          if (slot) {
            slot.value = "";
            slot.product = null;
            render();
          }
        }
      });

      updateFooter();
    }

    function updateFooter() {
      const filled = slots.filter(s => s.product).length;
      document.getElementById("counter").textContent =
        `${slots.length} de ${MAX} slots — ${filled} produto${filled !== 1 ? "s" : ""} selecionado${filled !== 1 ? "s" : ""}`;
      document.getElementById("compare-btn").disabled = filled < 2;
    }

    // ── Compare button ─────────────────────────────────────
    document.getElementById("compare-btn").addEventListener("click", () => {
      const selected = slots.filter(s => s.product).map(s => s.product);
      if (selected.length < 2) return;

      // ✏️  AJUSTE AQUI: faça o que quiser com os produtos selecionados.
      // Cada item tem: product_name, brands, image_small_url, nutriments
      onCompare(selected);
    });

    // ── Callback ───────────────────────────────────────────
    // ✏️  Substitua esta função pela sua lógica.
    function onCompare(products) {
      console.log("Produtos selecionados:", products);
      alert(
        "Comparando:\n" +
        products.map(p => `• ${p.product_name} (${p.brands ?? "sem marca"})`).join("\n")
      );
    }

    // ── Init ───────────────────────────────────────────────
    render();
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparativo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            text-align: center;
            padding-top: 12px;
        }

        .comparador-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 24px;
            margin-top: 20px;
            padding: 0 16px;
            flex-wrap: wrap;
        }

        .busca-alimento {
            display: flex;
            flex-direction: column;
            min-width: 260px;
        }

        .busca-alimento input {
            margin-top: 6px;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <header>
        <h1>NutriPro</h1>
        <hr>
    </header>

    <main class="comparador-container">
        <div class="busca-alimento">
            <label for="alimento1">Produto 1:</label>
            <input list="lista-alimentos" id="alimento1" name="alimento1" placeholder="Digite o nome ou marca...">
        </div>

        <div class="busca-alimento">
            <label for="alimento2">Produto 2:</label>
            <input list="lista-alimentos" id="alimento2" name="alimento2" placeholder="Digite o nome ou marca...">
        </div>

        <datalist id="lista-alimentos"></datalist>
    </main>
</body>
</html>
